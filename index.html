<script>
  // Твой конфиг
  const firebaseConfig = {
    apiKey: "AIzaSyAbBIPW5RaaBQYBmlXhVVBV0606QKBvJng",
    authDomain: "telega-85cca.firebaseapp.com",
    databaseURL: "https://telega-85cca-default-rtdb.firebaseio.com",
    projectId: "telega-85cca",
    storageBucket: "telega-85cca.firebasestorage.app",
    messagingSenderId: "213088586635",
    appId: "1:213088586635:web:5ee9a8985a9fb5403f7d8e"
  };

  // Инициализация
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Функция для отрисовки видео в стиле 2010 года
  function displayVideos() {
    // В твоем HTML есть блок с ID 'feed_top_videos-content' (Most Popular)
    const videoContainer = document.getElementById('feed_top_videos-content');
    
    db.ref('videos').on('value', (snapshot) => {
      const data = snapshot.val();
      videoContainer.innerHTML = ''; // Очищаем заглушки архива

      for (let id in data) {
        const video = data[id];
        
        // Генерируем HTML блок (сетка видео)
        videoContainer.innerHTML += `
          <div class="video-entry" style="display:inline-block; width:160px; margin:10px; vertical-align:top;">
            <a href="watch.html?v=${id}">
              <div style="position:relative;">
                <img src="${video.thumbnail_url}" width="130" height="97" style="border:1px solid #ccc; padding:2px; background:#fff;">
                <span style="position:absolute; bottom:5px; right:5px; background:#000; color:#fff; font-size:10px; padding:1px 3px;">${video.duration || '0:00'}</span>
              </div>
              <div style="font-weight:bold; color:#0033CC; font-size:12px; margin-top:5px; line-height:1.2;">
                ${video.title}
              </div>
            </a>
            <div style="color:#666; font-size:11px;">from ${video.author}</div>
            <div style="color:#666; font-size:11px;">${video.views} views</div>
          </div>
        `;
      }
    });
  }

  // Запускаем при загрузке
  displayVideos();
</script>
